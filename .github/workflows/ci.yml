name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-unit:
    name: Build and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChokaQ.sln

      - name: Build
        run: dotnet build ChokaQ.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test ChokaQ.sln --configuration Release --no-build --filter "Category=Unit" --logger "trx;LogFileName=unit.trx"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: tests/**/TestResults/*.trx

  sql-integration:
    name: SQL integration tests
    runs-on: ubuntu-latest
    needs: build-and-unit

    # SQL behavior is the core production contract for ChokaQ. This job runs
    # separately from unit tests so the fast gate stays Docker-free while the
    # integration gate still proves Testcontainers, schema provisioning, locks,
    # transactional moves, and query-shape tests against a real SQL Server.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChokaQ.sln

      - name: Build
        run: dotnet build ChokaQ.sln --configuration Release --no-restore

      - name: SQL integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
        run: dotnet test ChokaQ.sln --configuration Release --no-build --filter "Category=Integration" --logger "trx;LogFileName=sql-integration.trx"

      - name: Upload SQL integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sql-integration-test-results
          path: tests/**/TestResults/*.trx
